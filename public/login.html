<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RankViz — Log In</title>
<style>
  :root{
    --navy-950:#050F22;
    --navy-900:#0A1E42;
    --navy-800:#0E2A5E;
    --royal:#1E4FD8;
    --azure:#2F6FED;
    --sky:#6FA8FF;
    --ice:#DCE9FB;
    --white:#FFFFFF;
    --ink:#0B1E3F;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:Arial, Helvetica, sans-serif;
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    color:var(--white);
    overflow-x:hidden;
    position:relative;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }

  /* ================= ANIMATED BACKGROUND ================= */
  .bg{
    position:fixed; inset:0; z-index:0;
    background:linear-gradient(125deg, var(--navy-950), var(--navy-800) 45%, var(--royal) 100%);
    background-size:220% 220%;
    animation:bgshift 16s ease-in-out infinite;
  }
  @keyframes bgshift{
    0%{background-position:0% 30%;}
    50%{background-position:100% 70%;}
    100%{background-position:0% 30%;}
  }
  .bg-grid{
    position:fixed; inset:0; z-index:1; pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px);
    background-size:46px 46px;
    mask-image:radial-gradient(ellipse 75% 65% at 50% 35%, black 20%, transparent 78%);
  }
  .orb{position:fixed; z-index:1; border-radius:50%; filter:blur(6px); pointer-events:none;}
  .orb1{width:420px;height:420px; top:-140px; left:-120px; background:radial-gradient(circle at 35% 30%, var(--sky), transparent 70%); opacity:0.35; animation:float1 13s ease-in-out infinite;}
  .orb2{width:300px;height:300px; bottom:-100px; right:-80px; background:radial-gradient(circle at 40% 40%, var(--azure), transparent 70%); opacity:0.3; animation:float2 17s ease-in-out infinite;}
  .orb3{width:180px;height:180px; top:20%; right:8%; background:radial-gradient(circle, var(--sky), transparent 70%); opacity:0.2; animation:float3 10s ease-in-out infinite;}
  @keyframes float1{0%,100%{transform:translate(0,0);}50%{transform:translate(60px,50px);}}
  @keyframes float2{0%,100%{transform:translate(0,0);}50%{transform:translate(-50px,-40px);}}
  @keyframes float3{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-30px,40px) scale(1.15);}}

  /* drifting data particles - ties to "records verifying" theme */
  .particles{position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden;}
  .p{
    position:absolute; bottom:-20px; width:4px; height:4px; border-radius:50%;
    background:var(--sky); opacity:0.55;
    animation:drift linear infinite;
  }
  @keyframes drift{
    0%{transform:translateY(0) translateX(0); opacity:0;}
    10%{opacity:0.6;}
    90%{opacity:0.6;}
    100%{transform:translateY(-115vh) translateX(var(--dx,20px)); opacity:0;}
  }

  /* ================= HIDDEN WORDS / CURSOR SPOTLIGHT ================= */
  .words-layer{
    position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden;
  }
  .hword{
    position:absolute;
    font-weight:800;
    letter-spacing:0.02em;
    color:rgba(255,255,255,0.045);
    white-space:nowrap;
    user-select:none;
    transition:color 0.15s ease, text-shadow 0.15s ease;
  }
  .words-bright{
    position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden;
    -webkit-mask-image:radial-gradient(circle 170px at var(--mx,50%) var(--my,50%), black 0%, transparent 100%);
    mask-image:radial-gradient(circle 170px at var(--mx,50%) var(--my,50%), black 0%, transparent 100%);
  }
  .words-bright .hword{
    color:var(--sky);
    text-shadow:0 0 18px rgba(111,168,255,0.85), 0 0 40px rgba(47,111,237,0.4);
  }

  /* ================= CONTENT ================= */
  .stage{position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; padding:40px 20px; width:100%;}

  /* ---- BIG LOGO ---- */
  .logo-row{
    display:flex; align-items:center; gap:6px;
    opacity:0; transform:translateY(-18px) scale(0.96);
    animation:logoIn 0.9s cubic-bezier(.2,.8,.2,1) forwards;
  }
  @keyframes logoIn{ to{ opacity:1; transform:translateY(0) scale(1); } }

  .logo-img{
    height:clamp(56px,8vw,84px);
    width:auto;
    display:block;
    filter:drop-shadow(0 12px 28px rgba(30,79,216,0.5));
  }

  .tagline{
    margin-top:10px;
    font-size:13px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:#AFC7F2;
    opacity:0;
    animation:fadeUp 0.8s ease forwards 0.35s;
  }
  @keyframes fadeUp{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

  .ai-chip{
    margin-top:14px;
    display:inline-flex; align-items:center; gap:7px;
    font-size:12px; color:#CBDBFF;
    background:rgba(111,168,255,0.1); border:1px solid rgba(111,168,255,0.25);
    padding:7px 14px; border-radius:100px;
    opacity:0; animation:fadeUp 0.8s ease forwards 0.5s;
  }
  .ai-chip b{color:#FFFFFF;}
  .ai-dot{
    width:7px; height:7px; border-radius:50%; background:#7FE0A8;
    box-shadow:0 0 0 0 rgba(127,224,168,0.6);
    animation:aiPulse 1.6s ease-out infinite;
  }
  @keyframes aiPulse{
    0%{box-shadow:0 0 0 0 rgba(127,224,168,0.55);}
    70%{box-shadow:0 0 0 6px rgba(127,224,168,0);}
    100%{box-shadow:0 0 0 0 rgba(127,224,168,0);}
  }

  /* ---- CARD ---- */
  .card{
    margin-top:34px;
    width:min(400px,92vw);
    background:rgba(255,255,255,0.98);
    border-radius:20px;
    padding:28px 28px 30px;
    color:var(--ink);
    box-shadow:0 40px 80px -20px rgba(3,10,25,0.55), 0 0 0 1px rgba(255,255,255,0.06);
    opacity:0; transform:translateY(24px);
    animation:cardIn 0.8s cubic-bezier(.2,.8,.2,1) forwards 0.45s;
  }
  @keyframes cardIn{ to{opacity:1; transform:translateY(0);} }

  .role-toggle{
    display:flex; background:#EEF3FC; border-radius:12px; padding:4px; position:relative;
  }
  .role-toggle button{
    flex:1; border:none; background:transparent; cursor:pointer;
    font-family:Arial, Helvetica, sans-serif;
    font-size:13.5px; font-weight:700; color:#6E85A8;
    padding:10px 8px; border-radius:9px; position:relative; z-index:2;
    display:flex; align-items:center; justify-content:center; gap:6px;
    transition:color 0.25s ease;
  }
  .role-toggle button.active{color:var(--royal);}
  .role-toggle button svg{width:14px;height:14px;}
  .role-pill{
    position:absolute; top:4px; left:4px; height:calc(100% - 8px); width:calc(50% - 4px);
    background:var(--white); border-radius:9px;
    box-shadow:0 6px 16px -6px rgba(30,79,216,0.35);
    transition:transform 0.32s cubic-bezier(.2,.8,.2,1);
  }
  .role-toggle.employee .role-pill{ transform:translateX(100%); }

  .welcome{margin-top:22px;}
  .welcome h1{font-size:22px; font-weight:800; letter-spacing:-0.01em;}
  .welcome p{font-size:13.5px; color:#6E85A8; margin-top:5px;}

  .auth-tabs{display:flex; gap:22px; margin-top:20px; border-bottom:1px solid #E7EEFA; position:relative;}
  .auth-tabs button{
    background:none; border:none; cursor:pointer; font-family:Arial, Helvetica, sans-serif;
    font-size:14px; font-weight:700; color:#8CA0C2; padding:0 0 10px; position:relative;
  }
  .auth-tabs button.active{color:var(--royal);}
  .auth-underline{position:absolute; bottom:-1px; left:0; height:2px; width:52px; background:var(--royal); transition:transform 0.3s cubic-bezier(.2,.8,.2,1);}
  .auth-tabs.signup .auth-underline{ transform:translateX(76px); width:66px; }

  .field{margin-top:18px;}
  .field label{font-size:12.5px; font-weight:700; color:#3C5478; display:block; margin-bottom:7px;}
  .field .input-wrap{position:relative;}
  .field input{
    width:100%; border:1.5px solid #E7EEFA; background:#F5F9FF; border-radius:10px;
    padding:12px 14px; font-size:14px; font-family:Arial, Helvetica, sans-serif; color:var(--ink);
    outline:none; transition:border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  }
  .field input:focus{ border-color:var(--azure); background:var(--white); box-shadow:0 0 0 4px rgba(47,111,237,0.14); }

  .login-btn{
    margin-top:24px; width:100%; border:none; cursor:pointer;
    background:linear-gradient(135deg, var(--royal), var(--navy-800));
    background-size:180% 180%;
    color:var(--white); font-family:Arial, Helvetica, sans-serif; font-weight:800; font-size:15px;
    padding:14px; border-radius:11px;
    display:flex; align-items:center; justify-content:center; gap:9px;
    box-shadow:0 16px 30px -12px rgba(30,79,216,0.55);
    transition:transform 0.2s cubic-bezier(.2,.8,.3,1), box-shadow 0.2s ease, background-position 0.5s ease;
  }
  .login-btn:hover{ transform:translateY(-2px) scale(1.015); box-shadow:0 22px 38px -12px rgba(30,79,216,0.6); background-position:100% 50%; }
  .login-btn:active{ transform:translateY(0) scale(0.99); }
  .login-btn svg{width:15px;height:15px; transition:transform 0.2s ease;}
  .login-btn:hover svg{ transform:translateX(3px); }

  .footer-note{
    margin-top:26px; text-align:center; font-size:12px; color:#B9CBEF;
    opacity:0; animation:fadeUp 0.8s ease forwards 0.75s;
  }
  .footer-note b{color:#DCE9FB;}

  @media (max-width:420px){
    .card{padding:24px 20px 26px;}
  }
</style>
</head>

  </div>
  <div class="tagline">AI-Powered Attendance Intelligence</div>

  <div class="ai-chip">
    <span class="ai-dot"></span> Secured &amp; verified by <b>RankViz AI</b>
  </div>

  <div class="card">
    <div class="role-toggle" id="roleToggle">
      <div class="role-pill"></div>
      <button class="active" data-role="hr">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l8 3.5v5.2c0 5-3.4 8.7-8 10.3-4.6-1.6-8-5.3-8-10.3V5.5L12 2z"/><path d="M9 12l2 2 4-4.5"/></svg>
        HR Admin
      </button>
      <button data-role="employee">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg>
        Employee
      </button>
    </div>

    <div class="welcome">
      <h1>Welcome back</h1>
      <p id="welcomeSub">Sign in to manage attendance, employees and reports.</p>
    </div>

    <div class="auth-tabs" id="authTabs">
      <button class="active" data-tab="login">Log In</button>
      <button data-tab="signup">Sign Up</button>
      <div class="auth-underline"></div>
    </div>

    <div class="field">
      <label for="user">Username or email</label>
      <div class="input-wrap"><input id="user" type="text" placeholder="hr@rankviz.com" value="hr@rankviz.com"></div>
    </div>
    <div class="field">
      <label for="pass">Password</label>
      <div class="input-wrap"><input id="pass" type="password" placeholder="••••••••" value="••••••"></div>
    </div>

    <button class="login-btn" id="loginBtn" onclick="window.sendPrompt && window.sendPrompt('Log in clicked')">
      <svg viewBox="0 0 24 24" fill="none"><path d="M10 17l5-5-5-5M15 12H3M15 4h4a2 2 0 012 2v12a2 2 0 01-2 2h-4" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Log In
    </button>
  </div>

  <div class="footer-note">© 2026 <b>RankViz</b> · hr@rankviz.com</div>
</div>

<script>
  /* role toggle */
  const roleToggle = document.getElementById('roleToggle');
  const welcomeSub = document.getElementById('welcomeSub');
  roleToggle.addEventListener('click', (e)=>{
    const btn = e.target.closest('button');
    if(!btn) return;
    roleToggle.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    roleToggle.classList.toggle('employee', btn.dataset.role === 'employee');
    welcomeSub.textContent = btn.dataset.role === 'employee'
      ? 'Sign in to view your attendance and shift records.'
      : 'Sign in to manage attendance, employees and reports.';
  });

  /* login/signup tabs */
  const authTabs = document.getElementById('authTabs');
  const loginBtn = document.getElementById('loginBtn');
  authTabs.addEventListener('click', (e)=>{
    const btn = e.target.closest('button');
    if(!btn) return;
    authTabs.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    authTabs.classList.toggle('signup', btn.dataset.tab === 'signup');
    loginBtn.lastChild.textContent = btn.dataset.tab === 'signup' ? ' Sign Up' : ' Log In';
  });

  /* hidden powerful words — same positions in dim layer + spotlight-bright layer */
  (function(){
    const words = ['SECURE','VERIFIED','ACCURATE','ERROR-FREE','ENCRYPTED','REAL-TIME','TRUSTED','AUDIT-READY','PRECISE','RELIABLE','TRANSPARENT','PROTECTED','INSTANT','CONSISTENT','ZERO-DUPLICATE','ON-TIME','AI-VERIFIED','ANOMALY DETECTION','SMART SYNC','PATTERN CHECK'];
    const dim = document.getElementById('wordsLayerDim');
    const bright = document.getElementById('wordsLayerBright');
    const vw = window.innerWidth, vh = window.innerHeight;
    const placed = [];
    words.forEach((w, i)=>{
      const size = 15 + Math.random()*26;
      const top = 6 + Math.random()*88;
      const left = 4 + Math.random()*80;
      const rot = (Math.random()*16-8).toFixed(1);
      [dim, bright].forEach(layer=>{
        const span = document.createElement('div');
        span.className = 'hword';
        span.textContent = w;
        span.style.fontSize = size+'px';
        span.style.top = top+'vh';
        span.style.left = left+'vw';
        span.style.transform = `rotate(${rot}deg)`;
        layer.appendChild(span);
      });
    });

    let mx = window.innerWidth/2, my = window.innerHeight/2;
    let cx = mx, cy = my;
    window.addEventListener('mousemove', (e)=>{ mx = e.clientX; my = e.clientY; }, {passive:true});
    window.addEventListener('touchmove', (e)=>{
      if(e.touches && e.touches[0]){ mx = e.touches[0].clientX; my = e.touches[0].clientY; }
    }, {passive:true});

    function loop(){
      cx += (mx-cx)*0.18;
      cy += (my-cy)*0.18;
      bright.style.setProperty('--mx', cx+'px');
      bright.style.setProperty('--my', cy+'px');
      requestAnimationFrame(loop);
    }
    loop();
  })();

  /* drifting particles */
  (function(){
    const wrap = document.getElementById('particles');
    const n = 22;
    for(let i=0;i<n;i++){
      const p = document.createElement('div');
      p.className = 'p';
      const left = Math.random()*100;
      const dur = 8 + Math.random()*10;
      const delay = Math.random()*10;
      const dx = (Math.random()*80-40)+'px';
      p.style.left = left+'vw';
      p.style.animationDuration = dur+'s';
      p.style.animationDelay = delay+'s';
      p.style.setProperty('--dx', dx);
      wrap.appendChild(p);
    }
  })();
</script>
